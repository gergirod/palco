name: Palco · resumen semanal

on:
  schedule:
    # Lunes 17:00 ART
    - cron: "0 20 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Solo listar destinatarios, sin mandar mail
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enviar resumen semanal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          BRIEF_RECIPIENTS: ${{ secrets.BRIEF_RECIPIENTS }}
          BRIEF_WATCHLIST: ${{ secrets.BRIEF_WATCHLIST }}
          PALCO_DASHBOARD_URL: ${{ vars.PALCO_DASHBOARD_URL }}
        run: |
          ARGS="--kind semanal"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/send_briefs.py $ARGS
